        const qty=r<30?1:r<60?2:r<80?4:r<90?8:12;

   DIFF ENGINE
   ═══════════════════════════════════════════════════════════════ */
const flatten = (nodes, pp="") => {
  const r=[];
  nodes.forEach(n => {
    const p = pp ? `${pp}/${n.componentId}` : n.componentId;
    r.push({...n, path:p});
    if(n.children&&n.children.length>0) r.push(...flatten(n.children,p));
  });
  return r;
};
const diff = (tA, tB) => {
  const fA=flatten(tA), fB=flatten(tB);
  const mA=new Map(fA.map(n=>[n.path,n])), mB=new Map(fB.map(n=>[n.path,n]));
  const ds=[];
  fA.forEach(a=>{
    const b=mB.get(a.path);
    if(!b){ds.push({type:"removed",path:a.path,nA:a,nB:null,ch:[]});}
    else{
      const ch=[];
      if(a.componentId!==b.componentId)ch.push({f:"Part Number",a:a.componentId,b:b.componentId});
      if(a.name!==b.name)ch.push({f:"Description",a:a.name,b:b.name});
      if(a.quantity!==b.quantity)ch.push({f:"Quantity",a:`${a.quantity} ${a.uom}`,b:`${b.quantity} ${b.uom}`});
      if(a.supplier!==b.supplier)ch.push({f:"Supplier",a:a.supplier||"—",b:b.supplier||"—"});
      if(a.warrantyMonths!==b.warrantyMonths)ch.push({f:"Warranty",a:`${a.warrantyMonths}mo`,b:`${b.warrantyMonths}mo`});
      if(a.lifecycleStatus!==b.lifecycleStatus)ch.push({f:"Status",a:a.lifecycleStatus,b:b.lifecycleStatus});
      if(a.isReplaceable!==b.isReplaceable)ch.push({f:"Replaceable",a:a.isReplaceable?"Yes":"No",b:b.isReplaceable?"Yes":"No"});
      if(ch.length>0)ds.push({type:"changed",path:a.path,nA:a,nB:b,ch});
    }
  });
  fB.forEach(b=>{if(!mA.has(b.path))ds.push({type:"added",path:b.path,nA:null,nB:b,ch:[]});});
  return {diffs:ds, diffMap:new Map(ds.map(d=>[d.path,d])), tA:fA.length, tB:fB.length};
};

    </div>

    {/* SELECTOR BAR */}
    <div style={{padding:"10px 16px",background:B.white,borderBottom:`1px solid ${B.cg}`,display:"flex",alignItems:"center",gap:12,flexShrink:0,flexWrap:"wrap"}}>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <label style={{fontSize:11,fontWeight:600,color:"#666",textTransform:"uppercase",letterSpacing:0.5}}>Product</label>
        <select value={selProd} onChange={e=>setSelProd(e.target.value)} style={selSty}>
          {PRODUCTS.map(p=><option key={p.id} value={p.id}>{p.model} — {p.name}</option>)}
        </select>
      </div>
      <div style={{width:1,height:24,background:B.cg}}/>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <label style={{fontSize:11,fontWeight:600,color:"#666",textTransform:"uppercase",letterSpacing:0.5}}>BOM A</label>
        <select value={selA} onChange={e=>{setSelA(e.target.value);setCompared(false);}} style={selSty}>
          {vers.map(v=><option key={v.bomId} value={v.bomId}>{v.bomType} {v.version} ({v.sourceSystem})</option>)}
        </select>
      </div>
      <Icon d={Icons.arrowLR} size={16} color={B.blue}/>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <label style={{fontSize:11,fontWeight:600,color:"#666",textTransform:"uppercase",letterSpacing:0.5}}>BOM B</label>
        <select value={selB} onChange={e=>{setSelB(e.target.value);setCompared(false);}} style={selSty}>
          {vers.map(v=><option key={v.bomId} value={v.bomId}>{v.bomType} {v.version} ({v.sourceSystem})</option>)}
        </select>
      </div>
      <button onClick={doCompare} disabled={!selA||!selB||selA===selB}
        style={{height:34,padding:"0 20px",borderRadius:3,border:"none",background:(!selA||!selB||selA===selB)?B.cg:B.blue,color:B.white,fontFamily:FONT.head,fontWeight:700,fontSize:13,cursor:"pointer",letterSpacing:0.3,display:"flex",alignItems:"center",gap:6,transition:"all 0.15s"}}>
        <Icon d={Icons.gitCompare} size={14} color="#fff"/> Compare
      </button>
      {compared&&dr&&<Fragment>
        <div style={{width:1,height:24,background:B.cg}}/>
        <label style={{display:"flex",alignItems:"center",gap:6,fontSize:12,cursor:"pointer",color:"#666"}}>
          <input type="checkbox" checked={showDO} onChange={e=>setShowDO(e.target.checked)} style={{accentColor:B.blue}}/>
          <Icon d={Icons.eye} size={13}/> Differences only
        </label>
      </Fragment>}
    </div>

    {/* TAB BAR */}
    {compared && <div style={{display:"flex",gap:0,borderBottom:`1px solid ${B.cg}`,background:B.white,flexShrink:0}}>
      {[{id:"sbs",l:"Side-by-Side",ic:Icons.layers},{id:"delta",l:"Delta Summary",ic:Icons.filter},{id:"meta",l:"Metadata",ic:Icons.info}].map(t=>
        <button key={t.id} onClick={()=>setTab(t.id)}
          style={{display:"flex",alignItems:"center",gap:6,padding:"10px 20px",border:"none",background:"transparent",
            borderBottom:tab===t.id?`3px solid ${B.blue}`:"3px solid transparent",
            color:tab===t.id?B.blue:"#666",fontFamily:FONT.head,fontWeight:600,fontSize:13,cursor:"pointer",transition:"all 0.15s"}}>
          <Icon d={t.ic} size={14} color={tab===t.id?B.blue:"#666"}/> {t.l}
          {t.id==="delta"&&dr&&<span style={{fontSize:10,fontFamily:FONT.mono,background:B.blue,color:"#fff",padding:"1px 6px",borderRadius:10,fontWeight:700}}>{dr.diffs.length}</span>}
        </button>
      )}
    </div>}

    {/* MAIN WORKSPACE */}
    <div style={{flex:1,overflow:"hidden",display:"flex"}}>
      {!compared ? (
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:40}}>
          <div style={{position:"relative",width:120,height:120}}>
            <div style={{position:"absolute",inset:0,background:`linear-gradient(135deg, ${B.cb} 0%, ${B.arctic}30 100%)`,clipPath:"polygon(20% 0, 100% 0, 80% 100%, 0% 100%)",borderRadius:4}}/>
            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <Icon d={Icons.gitCompare} size={40} color={B.blue}/>
            </div>
          </div>
          <div style={{fontFamily:FONT.head,fontWeight:700,fontSize:20,color:B.black}}>Select BOMs to Compare</div>
          <div style={{fontSize:14,color:"#888",maxWidth:420,textAlign:"center",lineHeight:1.5}}>
            Choose a product and two BOM versions above, then click <strong style={{color:B.blue}}>Compare</strong> to see side-by-side differences, delta summary, and metadata.
          </div>
          <div style={{marginTop:12,fontSize:12,color:"#aaa",fontFamily:FONT.mono}}>Daikin Comfort Technologies × Profisee MDM</div>
        </div>
      ) : tab==="sbs" ? (
        <div style={{flex:1,display:"flex",overflow:"hidden"}}>
          <BOMTreePanel title={`${mA.bomType} ${mA.version}`} bomType={mA.bomType} nodes={tA} dm={dr.diffMap} hlPath={hlPath} onSel={setHlPath} side="a" searchTerm=""/>
          <BOMTreePanel title={`${mB.bomType} ${mB.version}`} bomType={mB.bomType} nodes={tB} dm={dr.diffMap} hlPath={hlPath} onSel={setHlPath} side="b" searchTerm=""/>
        </div>
      ) : tab==="delta" ? (
        <DeltaSummary diffs={dr.diffs} onNav={navDelta}/>
      ) : (
        <MetadataPanel mA={mA} mB={mB} dr={dr}/>
      )}
    </div>

    {/* STATUS FOOTER */}
    <div style={{height:30,background:B.black,display:"flex",alignItems:"center",padding:"0 16px",gap:16,flexShrink:0,fontFamily:FONT.mono,fontSize:11,color:"#888"}}>
      {compared&&dr?<Fragment>
        <span style={{color:B.arctic}}>{dr.diffs.length} differences</span>
        <span>across {dr.tA} / {dr.tB} nodes</span>
        <div style={{flex:1}}/>
        <span>Product: {product?.model}</span>
        <span>•</span>
        <span>Compared just now</span>
      </Fragment>:<Fragment>
        <span>Ready</span><div style={{flex:1}}/><span>Daikin Comfort Technologies × Profisee MDM</span>
      </Fragment>}
    </div>
  </div>;
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
